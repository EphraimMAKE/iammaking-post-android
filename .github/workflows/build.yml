name: Build & Sign Release AAB

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build Release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify AAB was signed
        run: |
          ls -lh app/build/outputs/bundle/release/

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: iammaking-post-release-${{ github.run_number }}
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Release 1.0.${{ github.run_number }}"
          body: |
            ## IAMMAKING Post — Android Release

            Built automatically from commit ${{ github.sha }}.

            ### Install
            Upload `iammaking-post.aab` to Google Play Console.

            ### What's included
            - WebView wrapping https://post.iammaking.com
            - Camera + file upload support
            - Pull-to-refresh
            - Offline fallback page
            - Signed release build
          files: app/build/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
