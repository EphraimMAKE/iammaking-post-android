name: Build & Sign Flutter Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Set version
        run: |
          YEAR=$(( $(date +%Y) - 2025 ))      # 2026 → 1, 2027 → 2
          MONTH=$(( 10#$(date +%m) - 1 ))     # Jan=0 … Dec=11
          BUILD=${{ github.run_number }}
          VERSION_NAME="${YEAR}.${MONTH}.${BUILD}"
          VERSION_CODE=$(( YEAR * 10000 + MONTH * 100 + BUILD ))
          echo "YEAR=$YEAR MONTH=$MONTH BUILD=$BUILD → $VERSION_NAME ($VERSION_CODE)"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          sed -i "s/^version: .*/version: $VERSION_NAME+$VERSION_CODE/" pubspec.yaml

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Generate launcher icons
        run: |
          for SIZE_DIR in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            DIR=$(echo $SIZE_DIR | cut -d: -f1)
            SIZE=$(echo $SIZE_DIR | cut -d: -f2)
            mkdir -p android/app/src/main/res/mipmap-${DIR}
            convert -size ${SIZE}x${SIZE} xc:#6C63FF \
              -fill white -font DejaVu-Sans-Bold -pointsize $((SIZE/2)) \
              -gravity Center -annotate 0 "P" \
              android/app/src/main/res/mipmap-${DIR}/ic_launcher.png
            cp android/app/src/main/res/mipmap-${DIR}/ic_launcher.png \
               android/app/src/main/res/mipmap-${DIR}/ic_launcher_round.png
          done

      - name: Flutter dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Release AAB
        run: flutter build appbundle --release
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename artifacts
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             iammaking-post-${{ env.VERSION_NAME }}.apk
          cp build/app/outputs/bundle/release/app-release.aab \
             iammaking-post-${{ env.VERSION_NAME }}.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}
          path: iammaking-post-${{ env.VERSION_NAME }}.apk
          retention-days: 90

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: AAB-${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}
          path: iammaking-post-${{ env.VERSION_NAME }}.aab
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: "IAMMAKING Post v${{ env.VERSION_NAME }} (build ${{ env.VERSION_CODE }})"
          body: |
            ## IAMMAKING Post — Flutter Release

            | Champ        | Valeur |
            |--------------|--------|
            | Package      | `com.iammaking.post` |
            | versionName  | `${{ env.VERSION_NAME }}` |
            | versionCode  | `${{ env.VERSION_CODE }}` |
            | Commit       | `${{ github.sha }}` |

            ### Fichiers
            - **`.aab`** → Google Play Console (recommandé)
            - **`.apk`** → Installation directe sur Android
          files: |
            iammaking-post-${{ env.VERSION_NAME }}.apk
            iammaking-post-${{ env.VERSION_NAME }}.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
