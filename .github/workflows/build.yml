name: Build & Sign Release AAB

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      # versionCode = 1000 + run_number (starts at 1001, increments each build)
      - name: Set version code
        run: |
          VERSION_CODE=$((1000 + ${{ github.run_number }}))
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          sed -i "s/versionCode 1001/versionCode $VERSION_CODE/" app/build.gradle
          sed -i "s/versionName \"1.0.1\"/versionName \"$VERSION_NAME\"/" app/build.gradle
          echo "Building versionCode=$VERSION_CODE versionName=$VERSION_NAME"

      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify AAB
        run: ls -lh app/build/outputs/bundle/release/

      - name: Rename AAB with version
        run: |
          cp app/build/outputs/bundle/release/app-release.aab \
             app/build/outputs/bundle/release/iammaking-post-${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: iammaking-post-${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}
          path: app/build/outputs/bundle/release/iammaking-post-*.aab
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: "IAMMAKING Post v${{ env.VERSION_NAME }} (build ${{ env.VERSION_CODE }})"
          body: |
            ## IAMMAKING Post — Android Release

            | Champ | Valeur |
            |-------|--------|
            | Package | `com.iammaking.com.post.app` |
            | versionName | `${{ env.VERSION_NAME }}` |
            | versionCode | `${{ env.VERSION_CODE }}` |
            | Commit | `${{ github.sha }}` |

            ### Comment utiliser ce fichier
            1. Télécharge `iammaking-post-${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}.aab`
            2. Va sur [Google Play Console](https://play.google.com/console)
            3. Production → Créer une version → Dépose l'AAB
          files: app/build/outputs/bundle/release/iammaking-post-*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
