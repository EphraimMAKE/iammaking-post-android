name: Build & Sign Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK + AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'
          cache-disabled: true

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Set version code & name
        run: |
          VERSION_CODE=$((1000 + ${{ github.run_number }}))
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          sed -i "s/versionCode 1001/versionCode $VERSION_CODE/" app/build.gradle
          sed -i "s/versionName \"1.0.1\"/versionName \"$VERSION_NAME\"/" app/build.gradle
          echo "✅ versionCode=$VERSION_CODE  versionName=$VERSION_NAME"

      - name: Build Release AAB + APK
        run: ./gradlew bundleRelease assembleRelease --no-daemon
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename output files
        run: |
          AAB_SRC="app/build/outputs/bundle/release/app-release.aab"
          APK_SRC="app/build/outputs/apk/release/app-release.apk"
          AAB_DST="app/build/outputs/bundle/release/iammaking-post-${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}.aab"
          APK_DST="app/build/outputs/apk/release/iammaking-post-${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}.apk"
          cp "$AAB_SRC" "$AAB_DST"
          cp "$APK_SRC" "$APK_DST"
          ls -lh app/build/outputs/bundle/release/ app/build/outputs/apk/release/

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: AAB-${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}
          path: app/build/outputs/bundle/release/iammaking-post-*.aab
          retention-days: 90

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}
          path: app/build/outputs/apk/release/iammaking-post-*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: "IAMMAKING Post v${{ env.VERSION_NAME }} (build ${{ env.VERSION_CODE }})"
          body: |
            ## IAMMAKING Post — Android Release

            | Champ | Valeur |
            |-------|--------|
            | Package | `com.iammaking.post` |
            | versionName | `${{ env.VERSION_NAME }}` |
            | versionCode | `${{ env.VERSION_CODE }}` |
            | Commit | `${{ github.sha }}` |

            ### Fichiers
            - **`.aab`** → Upload sur Google Play Console (recommandé)
            - **`.apk`** → Installation directe sur Android (tests / distribution manuelle)

            ### Comment utiliser
            1. Télécharge l'AAB ci-dessous
            2. Va sur [Google Play Console](https://play.google.com/console)
            3. Production → Créer une version → Dépose l'AAB
          files: |
            app/build/outputs/bundle/release/iammaking-post-*.aab
            app/build/outputs/apk/release/iammaking-post-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
