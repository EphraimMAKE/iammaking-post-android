name: iammaking_post
description: IAMMAKING Post — Social Media Publishing Platform
publish_to: none
version: 1.0.1+1001

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.2

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.3.0

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Date/time
  intl: ^0.19.0

  # UX helpers
  shimmer: ^3.0.0
  timeago: ^3.6.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
