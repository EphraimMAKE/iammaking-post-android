plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

// Read version from CI env vars; fall back to defaults for local builds
def ciVersionCode = System.getenv("VERSION_CODE")
def ciVersionName = System.getenv("VERSION_NAME")
def appVersionCode = ciVersionCode ? ciVersionCode.toInteger() : 1001
def appVersionName = ciVersionName ?: "1.0.1"

android {
    namespace "com.iammaking.post"
    compileSdk 35
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.iammaking.post"
        minSdk flutter.minSdkVersion
        targetSdk 35
        versionCode appVersionCode
        versionName appVersionName
    }

    signingConfigs {
        release {
            storeFile     file("release.keystore")
            storePassword System.getenv("SIGNING_STORE_PASSWORD") ?: ""
            keyAlias      System.getenv("SIGNING_KEY_ALIAS") ?: ""
            keyPassword   System.getenv("SIGNING_KEY_PASSWORD") ?: ""
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source '../..'
}
